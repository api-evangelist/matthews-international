description: Matthews International (NASDAQ MATW) is a diversified industrial holding company with three
  segments — Memorialization, Industrial Technologies (warehouse automation, marking & coding), and
  SGK Brand Solutions. The company does not operate a public developer program or publish API pricing.
  Any technical integrations are bilateral B2B engagements (e.g. funeral home POS, packaging artwork
  workflow, warehouse automation control systems) priced inside the broader product / project contract.
notes: |
  No public developer portal, no published API pricing. Set reconciled=true only if a customer-facing
  developer program is launched. The api.matw.com domain in the scaffold is illustrative; no public docs
  resolve there.
