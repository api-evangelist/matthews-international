specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Matthews International
providerId: matthews-international
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Memorialization
  - Branding
  - Industrial
  - Rate Limiting
description: Matthews International does not publish API rate limits because there is no public developer
  program. Any integration limits are negotiated inside the underlying solution contract (Memorialization,
  Industrial Technologies, SGK Brand Solutions) and are not externally documented.
notes: |
  No public rate-limit documentation. Set reconciled=true only if a public developer surface emerges.
sources:
  - https://www.matw.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Contract-scoped limit
    scope: customer-contract
    metric: varies
    limit: 'not publicly documented'
    applies:
      - Matthews International API
    notes: Rate or throughput agreements, where present, exist inside the underlying solution contract
      (e.g. warehouse automation control plane, brand workflow integration).
policies:
  - name: Backoff Strategy
    description: Clients integrating with Matthews business-segment systems should follow standard exponential-
      backoff-with-jitter on transient errors and honor Retry-After when present.
  - name: Contract-Scoped Limits
    description: Any throughput, concurrency, or polling-frequency obligations live in the integration
      statement-of-work, not in a public developer doc.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
