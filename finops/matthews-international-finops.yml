specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Matthews International
providerId: matthews-international
publisherName: Matthews International Corporation
serviceCategory: Industrial / B2B Solutions
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Memorialization
  - Branding
  - Industrial
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps shape for Matthews International: solution / project-priced industrial
  and brand-workflow integrations. There is no per-API-call meter; cost lives at the contract / project
  level.'
notes: |
  No public per-API pricing. Meters track contract-level economics (license, project services, support)
  rather than API request volume.
sources:
  - https://www.matw.com/
principles:
  - name: Visibility
    description: Track integration spend at the project / contract level via the underlying purchase
      order and statement-of-work; aggregate by Matthews business segment (Memorialization, Industrial
      Technologies, SGK).
  - name: Allocation
    description: Allocate by consuming business unit / facility / brand. For warehouse automation, allocate
      by site; for SGK brand workflows, allocate by brand and packaging program.
  - name: Optimization
    description: Consolidate integrations across sites and brands to reuse a single connector, negotiate
      multi-year support, and revisit feature usage at contract renewal.
  - name: Accountability
    description: Assign a contract owner per Matthews business segment who reviews invoice accuracy and
      milestone delivery against the SOW.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Allocation
      - Reporting and Analytics
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Budgeting
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Licensing and SaaS
      - Workload Optimization
  - name: Manage the FinOps Practice
    capabilities:
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Project / Solution Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD (settlement varies)
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Matthews International Solutions
  ServiceCategory: Industrial / B2B Solutions
  ProviderName: Matthews International
  PublisherName: Matthews International Corporation
  InvoiceIssuerName: Matthews International Corporation
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: solution_license
    description: Per-solution license, billed under the customer contract.
    unit: month
    aggregation: max
    dimensions:
      - segment
      - product
      - site
  - name: professional_services
    description: Implementation / professional services hours billed against the SOW.
    unit: hour
    aggregation: sum
    dimensions:
      - project
      - site
  - name: support_contract
    description: Annual support / maintenance contract value.
    unit: year
    aggregation: max
    dimensions:
      - segment
      - product
apis:
  - name: Matthews International API
    baseURL: https://api.matw.com
    tags:
      - Memorialization
      - Branding
      - Industrial
    serviceName: Matthews International API
    serviceCategory: API
unitEconomics:
  - name: Cost per Site
    metric: billed_cost / active_sites
    target: TBD
  - name: Cost per Brand Program
    metric: billed_cost / brand_programs
    target: TBD
maintainers:
